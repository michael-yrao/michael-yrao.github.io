<nav class="po-nav">
  <div class="po-nav__inner">
    <a class="po-nav__brand" routerLink="/">
      <span class="po-nav__logo">PO</span>
      <span class="po-nav__title">Progressive Overflow</span>
    </a>

    <button
      *ngIf="currentCtx"
      class="po-nav__context"
      [class.open]="descriptionOpen"
      (click)="toggleDescription($event)"
      aria-label="Toggle problem description"
    >
      <span class="po-nav__ctx-num">#{{ currentCtx.num }}</span>
      <span class="po-nav__ctx-title">{{ currentCtx.title }}</span>
      <span class="po-nav__ctx-chevron" [class.open]="descriptionOpen">›</span>
    </button>

    <div class="po-nav__links">
      <a routerLink="/about" routerLinkActive="active">About</a>
      <a routerLink="/games" routerLinkActive="active">Games</a>
      <a routerLink="/algorithms" routerLinkActive="active">Algorithms</a>
    </div>
  </div>

  <!-- Description popover, anchored below the nav -->
  <div class="po-nav__popover" *ngIf="descriptionOpen && currentCtx">
    <p class="po-popover__desc">{{ currentCtx.description }}</p>

    <div class="po-popover__examples" *ngIf="currentCtx.examples.length">
      <div *ngFor="let ex of currentCtx.examples; let i = index" class="po-popover__example">
        <div class="po-popover__ex-header">Example {{ i + 1 }}</div>
        <div class="po-popover__ex-body">
          <div class="po-popover__ex-row">
            <span class="po-popover__ex-label">Input</span>
            <code class="po-popover__ex-code">{{ ex.input }}</code>
          </div>
          <div class="po-popover__ex-row">
            <span class="po-popover__ex-label">Output</span>
            <code class="po-popover__ex-code">{{ ex.output }}</code>
          </div>
          <div class="po-popover__ex-row" *ngIf="ex.explanation">
            <span class="po-popover__ex-label">Why</span>
            <span class="po-popover__ex-note">{{ ex.explanation }}</span>
          </div>
        </div>
      </div>
    </div>

    <ul class="po-popover__constraints" *ngIf="currentCtx.constraints.length">
      <li *ngFor="let c of currentCtx.constraints">{{ c }}</li>
    </ul>
  </div>
</nav>

<!-- Backdrop: closes popover on outside click -->
<div class="po-nav__backdrop" *ngIf="descriptionOpen" (click)="descriptionOpen = false"></div>

<main class="po-main">
  <router-outlet></router-outlet>
</main>
