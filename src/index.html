<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <base href="/">
    <title>Progressive Overflow — Interactive Algorithm Visualizations</title>
    <meta name="description" content="Step through LeetCode and NeetCode 150 algorithms one decision at a time, with plain-English explanations and animated visualizations for arrays, trees, graphs, and more.">
    <meta name="theme-color" content="#0f172a">

    <!-- Open Graph / social -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Progressive Overflow">
    <meta property="og:title" content="Progressive Overflow — Interactive Algorithm Visualizations">
    <meta property="og:description" content="Step through LeetCode algorithms one decision at a time, with plain-English explanations and animated visualizations.">
    <meta property="og:url" content="https://progressiveoverflow.com/">
    <meta name="twitter:card" content="summary">

    <script>
      // Apply saved theme before first paint to avoid a flash (dark is default).
      try {
        if (localStorage.getItem('po-theme') === 'light') {
          document.documentElement.dataset.theme = 'light';
        }
      } catch (e) { /* storage unavailable — stay dark */ }
    </script>
    <script>
      // Restore path encoded by 404.html redirect (GitHub Pages SPA fix).
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location));
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
